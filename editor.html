<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>✏️ Editeur XowenCrew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body { background-color: #0f0f23; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-bg { background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 100%); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #c44dff; border-radius: 10px; }
    </style>
</head>
<body class="text-white min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-pink-400 to-purple-400 bg-clip-text text-transparent mb-2">✏️ EDITEUR XOWENCREW</h1>
            <p class="text-white/50">Edite l'équipe en temps réel sans toucher au code JSON</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-6">
            <!-- Panel Edition Visuel -->
            <div class="glass rounded-2xl p-6">
                <div class="flex gap-3 mb-6 flex-wrap">
                    <button onclick="switchTab('crew')" id="tab-crew" class="flex-1 glass px-4 py-3 rounded-xl font-medium active-tab">🧑🤝🧑 XowenCrew</button>
                    <button onclick="switchTab('donations')" id="tab-donations" class="flex-1 glass px-4 py-3 rounded-xl font-medium">💜 Donations</button>
                    <button onclick="switchTab('projets')" id="tab-projets" class="flex-1 glass px-4 py-3 rounded-xl font-medium">🚀 Projets</button>
                    <button onclick="switchTab('liens')" id="tab-liens" class="flex-1 glass px-4 py-3 rounded-xl font-medium">🔗 Liens Sociaux</button>
                </div>

                <div id="panel-crew">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">Membres de l'équipe</h2>
                        <button onclick="addNewMember()" class="gradient-bg px-4 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">+ Ajouter</button>
                    </div>
                
                <div id="members-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                </div>
            </div>

            <div id="panel-donations" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Historique des donations</h2>
                    <button onclick="addNewDonation()" class="gradient-bg px-4 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">+ Ajouter un don</button>
                </div>
                
                <div id="donations-list" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2">
                </div>
            </div>

            <div id="panel-projets" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Projets en cours</h2>
                    <button onclick="addNewProject()" class="gradient-bg px-4 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">+ Ajouter un projet</button>
                </div>
                
                <div id="projets-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                </div>
            </div>

            <div id="panel-liens" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Réseaux Sociaux & Liens</h2>
                    <button onclick="addNewLink()" class="gradient-bg px-4 py-2 rounded-full text-sm font-medium hover:opacity-90 transition">+ Ajouter un lien</button>
                </div>
                
                <div id="liens-list" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                </div>
            </div>

            <!-- Panel Aperçu & Actions -->
            <div class="space-y-6">
                <!-- Aperçu Live -->
                <div class="glass rounded-2xl p-6">
                    <h2 class="text-xl font-bold mb-4">👁️ Aperçu en direct</h2>
                    <div id="live-preview" class="grid md:grid-cols-2 gap-4">
                    </div>
                </div>

                <!-- Actions -->
                <div class="glass rounded-2xl p-6">
                    <div class="flex flex-wrap gap-3 mb-4">
                        <button onclick="saveConfig()" class="gradient-bg px-6 py-3 rounded-xl font-medium hover:opacity-90 transition flex-1">💾 Sauvegarder xowencrew.json</button>
                        <button onclick="loadConfig()" class="glass px-6 py-3 rounded-xl font-medium hover:bg-white/10 transition flex-1">📥 Recharger</button>
                        <button onclick="openWebsite()" class="glass px-6 py-3 rounded-xl font-medium hover:bg-white/10 transition flex-1">🌐 Voir le site</button>
                    </div>
                    
                    <div id="status-message" class="p-3 rounded-lg hidden text-sm"></div>

                    <div class="mt-4 p-3 bg-black/30 rounded-lg">
                        <div class="flex justify-between items-center">
                            <span class="text-white/50 text-sm">JSON Brut</span>
                            <button onclick="copyRawJson()" class="text-purple-400 text-sm hover:text-purple-300">📋 Copier</button>
                        </div>
                        <textarea id="raw-json" class="w-full h-40 mt-2 bg-black/50 border-none rounded-lg p-3 font-mono text-xs text-green-300 resize-none focus:outline-none" spellcheck="false"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let crewData = { xowencrew: [] };
        const rolesList = [
            'Admin Principal',
            'Modérateur Chat Live',
            'Graphiste',
            'Community Manager',
            'Producteur Musical',
            'Idéateur / Testeur'
        ];

        async function loadConfig() {
            try {
                const response = await fetch('xowencrew.json?t=' + Date.now());
                crewData = await response.json();
                renderEditor();
                showStatus('✅ Configuration chargée', 'success');
            } catch(e) {
                showStatus('❌ Erreur chargement fichier', 'error');
            }
        }

        function renderEditor() {
            const listContainer = document.getElementById('members-list');
            listContainer.innerHTML = '';

            crewData.xowencrew.forEach((member, index) => {
                listContainer.innerHTML += `
                <div class="glass rounded-xl p-4" id="member-${index}">
                    <div class="flex justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-400 flex items-center justify-center">${index+1}</div>
                            <div>
                                <input type="text" value="${member.pseudo}" onchange="updateMember(${index}, 'pseudo', this.value)" class="bg-transparent border-none font-bold focus:outline-none w-full" placeholder="Pseudo">
                            <input type="text" value="${member.role}" onchange="updateMember(${index}, 'role', this.value)" class="bg-transparent border-none text-sm text-white/60 focus:outline-none w-full" placeholder="Rôle personnalisé">
                            </div>
                        </div>
                        <button onclick="deleteMember(${index})" class="text-red-400 hover:text-red-300 text-sm">🗑️</button>
                    </div>
                    

                    <div class="flex justify-between items-center mb-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" ${member.status === 'actif' ? 'checked' : ''} onchange="updateMember(${index}, 'status', this.checked ? 'actif' : 'inactif')" class="accent-purple-500">
                            <span class="text-sm text-white/60">Membre actif</span>
                        </label>
                        <button onclick="moveMember(${index}, -1)" class="text-white/40 hover:text-white text-sm">↑</button>
                        <button onclick="moveMember(${index}, 1)" class="text-white/40 hover:text-white text-sm">↓</button>
                    </div>
                    
                    <div>
                        <div class="text-xs text-white/40 mb-2">Couleur du rond</div>
                        <div class="flex gap-2 flex-wrap">
                            ${['from-blue-400 to-cyan-500', 'from-pink-400 to-rose-500', 'from-purple-400 to-violet-500', 'from-amber-400 to-orange-500', 'from-green-400 to-emerald-500', 'from-red-400 to-pink-500', 'from-indigo-400 to-blue-500', 'from-teal-400 to-cyan-500'].map(color => `
                            <button onclick="updateMember(${index}, 'color', '${color}')" class="w-8 h-8 rounded-full bg-gradient-to-br ${color} border-2 ${member.color === color ? 'border-white' : 'border-transparent'} hover:scale-110 transition"></button>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            });

            document.getElementById('raw-json').value = JSON.stringify(crewData, null, 2);
            renderPreview();
        }

        function renderPreview() {
            const previewContainer = document.getElementById('live-preview');
            previewContainer.innerHTML = '';

            const roleColors = {
                'Admin Principal': 'from-blue-400 to-cyan-500',
                'Modérateur Chat Live': 'from-pink-400 to-rose-500',
                'Graphiste': 'from-purple-400 to-violet-500',
                'Community Manager': 'from-amber-400 to-orange-500',
                'Producteur Musical': 'from-green-400 to-emerald-500',
                'Idéateur / Testeur': 'from-red-400 to-pink-500'
            };

            const roleIcons = {
                'Admin Principal': '👑',
                'Modérateur Chat Live': '🛡️',
                'Graphiste': '🎨',
                'Community Manager': '📱',
              'Producteur Musical': '🎵',
                'Idéateur / Testeur': '💡'
            };

            crewData.xowencrew.forEach(member => {
                previewContainer.innerHTML += `
                <div class="glass rounded-xl p-3 text-sm">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br ${member.color || roleColors[member.role] || 'from-gray-400 to-gray-500'} mb-2 flex items-center justify-center">
                        ${roleIcons[member.role] || '👤'}
                    </div>
                    <div class="font-bold">${member.role}</div>
                    <div class="text-white/50 text-xs">@${member.pseudo}</div>
                    ${member.status === 'actif' ? '<div class="text-green-400 text-xs mt-1">✅ Actif</div>' : ''}
                </div>`;
            });
        }

        function updateMember(index, field, value) {
            crewData.xowencrew[index][field] = value;
            document.getElementById('raw-json').value = JSON.stringify(crewData, null, 2);
            renderPreview();
        }

        function addNewMember() {
            crewData.xowencrew.push({
                pseudo: 'NouveauMembre',
                role: 'Modérateur Chat Live',
                missions: ['Mission 1', 'Mission 2', 'Mission 3'],
                status: 'actif'
            });
            renderEditor();
            showStatus('✅ Membre ajouté', 'success');
        }

        function deleteMember(index) {
            crewData.xowencrew.splice(index, 1);
            renderEditor();
            showStatus('✅ Membre supprimé', 'success');
        }

        function moveMember(index, direction) {
            const newIndex = index + direction;
            if(newIndex < 0 || newIndex >= crewData.xowencrew.length) return;
            [crewData.xowencrew[index], crewData.xowencrew[newIndex]] = [crewData.xowencrew[newIndex], crewData.xowencrew[index]];
            renderEditor();
        }

        async function saveConfig() {
            try {
                const blob = new Blob([JSON.stringify(crewData, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'xowencrew.json';
                a.click();
                showStatus('✅ Fichier sauvegardé ! Remplace le fichier xowencrew.json par celui-ci', 'success');
            } catch(e) {
                showStatus('❌ Erreur sauvegarde', 'error');
            }
        }

        function copyRawJson() {
            navigator.clipboard.writeText(document.getElementById('raw-json').value);
            showStatus('✅ JSON copié dans le presse-papier', 'success');
        }

        function openWebsite() {
            window.open('http://localhost:8080/#crew');
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status-message');
            el.textContent = msg;
            el.className = 'p-3 rounded-lg text-sm ' + (type === 'success' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        function switchTab(tab) {
            document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('gradient-bg'));
            
            document.getElementById('panel-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('gradient-bg');
            
            if(tab === 'donations') renderDonationsEditor();
            if(tab === 'projets') renderProjetsEditor();
            if(tab === 'liens') renderLiensEditor();
        }

        function renderProjetsEditor() {
            if(!crewData.projets) crewData.projets = [];
            
            const container = document.getElementById('projets-list');
            container.innerHTML = '';

            crewData.projets.forEach((proj, index) => {
                container.innerHTML += `
                <div class="glass rounded-xl p-4">
                    <div class="flex justify-between mb-3">
                        <input type="text" value="${proj.titre}" onchange="updateProjet(${index}, 'titre', this.value)" class="bg-transparent border-none font-bold focus:outline-none w-full" placeholder="Titre du projet">
                        <button onclick="deleteProjet(${index})" class="text-red-400 hover:text-red-300 text-sm">🗑️</button>
                    </div>
                    
                    <textarea onchange="updateProjet(${index}, 'description', this.value)" class="w-full bg-black/30 rounded-lg p-2 text-sm focus:outline-none resize-none h-20 mb-2" placeholder="Description">${proj.description || ''}</textarea>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" value="${proj.icône || '🎮'}" onchange="updateProjet(${index}, 'icône', this.value)" class="bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Emoji">
                        <input type="text" value="${proj.statut || 'En cours'}" onchange="updateProjet(${index}, 'statut', this.value)" class="bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Statut">
                    </div>
                    
                    <input type="text" value="${proj.tags ? proj.tags.join(', ') : ''}" onchange="updateProjet(${index}, 'tags', this.value.split(',').map(t => t.trim()))" class="w-full bg-black/30 rounded-lg p-2 text-sm focus:outline-none mt-2" placeholder="Tags (séparés par virgule)">
                </div>`;
            });
        }

        function updateProjet(index, field, value) {
            crewData.projets[index][field] = value;
            document.getElementById('raw-json').value = JSON.stringify(crewData, null, 2);
        }

        function addNewProject() {
            if(!crewData.projets) crewData.projets = [];
            crewData.projets.push({ titre: 'Nouveau Projet', description: '', icône: '🎮', statut: 'En cours', tags: [] });
            renderProjetsEditor();
            showStatus('✅ Projet ajouté', 'success');
        }

        function deleteProjet(index) {
            crewData.projets.splice(index, 1);
            renderProjetsEditor();
            showStatus('✅ Projet supprimé', 'success');
        }

        function renderLiensEditor() {
            if(!crewData.liens) crewData.liens = [];
            
            const container = document.getElementById('liens-list');
            container.innerHTML = '';

            crewData.liens.forEach((lien, index) => {
                container.innerHTML += `
                <div class="glass rounded-xl p-4">
                    <div class="flex justify-between mb-3">
                        <input type="text" value="${lien.nom}" onchange="updateLien(${index}, 'nom', this.value)" class="bg-transparent border-none font-bold focus:outline-none w-full" placeholder="Nom du réseau">
                        <button onclick="deleteLien(${index})" class="text-red-400 hover:text-red-300 text-sm">🗑️</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" value="${lien.icône || '🔗'}" onchange="updateLien(${index}, 'icône', this.value)" class="bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Emoji">
                        <input type="color" value="${lien.couleur || '#9146FF'}" onchange="updateLien(${index}, 'couleur', this.value)" class="bg-black/30 rounded-lg p-1 h-full w-full" title="Couleur">
                    </div>
                    
                    <input type="text" value="${lien.url}" onchange="updateLien(${index}, 'url', this.value)" class="w-full bg-black/30 rounded-lg p-2 text-sm focus:outline-none mb-2" placeholder="URL du lien">
                    
                    <input type="text" value="${lien.description || ''}" onchange="updateLien(${index}, 'description', this.value)" class="w-full bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Description (optionnelle)">
                </div>`;
            });
        }

        function updateLien(index, field, value) {
            if(field === 'url') {
                value = value.replace(/^#+/, '').trim();
            }
            crewData.liens[index][field] = value;
            document.getElementById('raw-json').value = JSON.stringify(crewData, null, 2);
        }

        function addNewLink() {
            if(!crewData.liens) crewData.liens = [];
            crewData.liens.push({ nom: 'Nouveau Réseau', url: '#', icône: '🔗', description: '', couleur: '#9146FF' });
            renderLiensEditor();
            showStatus('✅ Lien ajouté', 'success');
        }

        function deleteLien(index) {
            crewData.liens.splice(index, 1);
            renderLiensEditor();
            showStatus('✅ Lien supprimé', 'success');
        }

        function renderDonationsEditor() {
            if(!crewData.donations) crewData.donations = [];
            
            const container = document.getElementById('donations-list');
            container.innerHTML = '';

            crewData.donations.forEach((don, index) => {
                container.innerHTML += `
                <div class="glass rounded-xl p-4">
                    <div class="flex justify-between mb-2">
                        <input type="text" value="${don.pseudo}" onchange="updateDonation(${index}, 'pseudo', this.value)" class="bg-transparent border-none font-semibold focus:outline-none" placeholder="Pseudo">
                        <button onclick="deleteDonation(${index})" class="text-red-400 hover:text-red-300 text-sm">🗑️</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" value="${don.amount}" onchange="updateDonation(${index}, 'amount', this.value)" class="bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Montant €">
                        <input type="text" value="${don.message || ''}" onchange="updateDonation(${index}, 'message', this.value)" class="bg-black/30 rounded-lg p-2 text-sm focus:outline-none" placeholder="Message">
                    </div>
                </div>`;
            });
        }

        function updateDonation(index, field, value) {
            crewData.donations[index][field] = value;
            document.getElementById('raw-json').value = JSON.stringify(crewData, null, 2);
        }

        function addNewDonation() {
            if(!crewData.donations) crewData.donations = [];
            crewData.donations.push({ pseudo: 'NouveauDonateur', amount: '0', message: '' });
            renderDonationsEditor();
            showStatus('✅ Don ajouté', 'success');
        }

        function deleteDonation(index) {
            crewData.donations.splice(index, 1);
            renderDonationsEditor();
            showStatus('✅ Don supprimé', 'success');
        }

        // Charger au démarrage
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>

    <style>
        .active-tab { background: linear-gradient(135deg, #ff6b9d 0%, #c44dff 100%); }

        @media (max-width: 1024px) {
            .grid.lg\\:grid-cols-2 { grid-template-columns: 1fr !important; }
        }

        @media (max-width: 768px) {
            body { padding: 1rem !important; }
            h1 { font-size: 1.8rem !important; }
            h2 { font-size: 1.2rem !important; }
            
            .flex.gap-3.flex-wrap button { flex: 1 1 45% !important; font-size: 0.8rem !important; padding: 0.7rem !important; }
            
            .flex.flex-wrap.gap-3 button { width: 100% !important; }
            
            input, textarea { font-size: 16px !important; }
        }
    </style>
</body>
</html>
